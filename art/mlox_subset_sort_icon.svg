<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1b22"/>
      <stop offset="1" stop-color="#0c0c10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a267"/>
      <stop offset="1" stop-color="#d8742e"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="10" y="10" width="236" height="236" rx="52" fill="url(#bg)"
        stroke="#3a3a44" stroke-width="2"/>
  <!-- subtle Morrowind-accent hairline along the top -->
  <rect x="10" y="10" width="236" height="236" rx="52" fill="none"
        stroke="#e8905a" stroke-width="2" opacity="0.14"/>

  <!-- load-order bars: three curated (blue-grey), your custom mod in orange -->
  <g>
    <rect x="86" y="66"  width="104" height="20" rx="10" fill="#46566b"/>
    <rect x="86" y="150" width="104" height="20" rx="10" fill="#46566b"/>
    <rect x="86" y="192" width="104" height="20" rx="10" fill="#46566b"/>

    <!-- the custom mod, slotting into place -->
    <rect x="78" y="108" width="120" height="20" rx="10" fill="url(#accent)"/>
    <!-- insertion pointer -->
    <path d="M54 108 l0 20 l18 -10 z" fill="url(#accent)"/>
  </g>

  <!-- order dots on the left rail -->
  <g fill="#7d8aa0">
    <circle cx="64" cy="76"  r="4.5"/>
    <circle cx="64" cy="160" r="4.5"/>
    <circle cx="64" cy="202" r="4.5"/>
  </g>
  <circle cx="64" cy="118" r="5.5" fill="#e8905a"/>
</svg>

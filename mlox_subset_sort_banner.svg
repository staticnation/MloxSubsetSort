<svg width="1600" height="450" viewBox="0 0 1600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#212429"/>
      <stop offset="100%" stop-color="#131417"/>
    </linearGradient>
    <radialGradient id="ash" cx="80%" cy="118%" r="95%">
      <stop offset="0%" stop-color="#9c2410" stop-opacity="0.60"/>
      <stop offset="34%" stop-color="#4a1109" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#131417" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a2b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6a2b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2e9"/>
      <stop offset="100%" stop-color="#f0c4a0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1600" height="450" fill="url(#bg)"/>
  <rect width="1600" height="450" fill="url(#ash)"/>
  <ellipse cx="1290" cy="250" rx="360" ry="260" fill="url(#emberGlow)"/>
  <rect x="0" y="0" width="1600" height="5" fill="#8a0808"/>
  <rect x="0" y="445" width="1600" height="5" fill="#8a0808" opacity="0.7"/>

  <!-- decorative daedric-esque angular glyphs (generic marks) -->
  <g stroke="#e8905a" stroke-width="3" fill="none" opacity="0.12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 380 l26 -46 l26 46 M133 357 h26"/>
    <path d="M980 70 l0 44 l30 0 l0 -30 M980 92 l30 0"/>
    <path d="M60 70 l34 0 l0 34 M77 70 l0 50"/>
    <path d="M1540 360 l0 40 M1524 372 l32 16 M1556 372 l-32 16"/>
  </g>

  <!-- LEFT: title block -->
  <g font-family="'DejaVu Sans','Arial',sans-serif">
    <text x="70" y="132" font-size="24" letter-spacing="10" fill="#e8905a" font-weight="700">OPENMW &#183; LOAD-ORDER TOOL</text>
    <text x="66" y="248" font-size="96" font-weight="700" fill="url(#title)" filter="url(#glow)">MLOX Subset Sort</text>
    <text x="72" y="308" font-size="31" fill="#d6d6d6">Sort your custom mods into the load order &#8212;</text>
    <text x="72" y="350" font-size="31" fill="#d6d6d6">without ever touching the curated MOMW list.</text>

    <g font-family="'DejaVu Sans Mono','monospace'" font-size="19" font-weight="700">
      <g>
        <rect x="72"  y="384" width="150" height="34" rx="17" fill="#20242a" stroke="#3f3f46"/>
        <text x="147" y="407" fill="#7ee0a0" text-anchor="middle">mlox rules</text>
      </g>
      <g>
        <rect x="236" y="384" width="212" height="34" rx="17" fill="#20242a" stroke="#3f3f46"/>
        <text x="342" y="407" fill="#59b6ff" text-anchor="middle">plugin-order.yml</text>
      </g>
      <g>
        <rect x="462" y="384" width="150" height="34" rx="17" fill="#20242a" stroke="#3f3f46"/>
        <text x="537" y="407" fill="#ffb454" text-anchor="middle">GUI + CLI</text>
      </g>
    </g>
  </g>

  <!-- RIGHT: load-order panel mock -->
  <g transform="translate(1104,64)" filter="url(#shadow)" font-family="'DejaVu Sans Mono','monospace'">
    <rect width="440" height="322" rx="14" fill="#141414" stroke="#3f3f46" stroke-width="1.5"/>
    <rect width="440" height="42" rx="14" fill="#22242a"/>
    <rect y="28" width="440" height="14" fill="#22242a"/>
    <circle cx="24" cy="21" r="6" fill="#8a0808"/>
    <circle cx="44" cy="21" r="6" fill="#ffb454"/>
    <circle cx="64" cy="21" r="6" fill="#7ee0a0"/>
    <text x="96" y="27" font-size="16" fill="#9a9a9a">Plugin load order</text>

    <!-- rows -->
    <g font-size="17">
      <!-- frozen base -->
      <text x="24" y="82"  fill="#8f8f8f">Morrowind.esm</text>
      <text x="24" y="112" fill="#8f8f8f">Tribunal.esm</text>
      <text x="24" y="142" fill="#8f8f8f">Bloodmoon.esm</text>

      <!-- inserted (green) -->
      <rect x="12" y="156" width="416" height="26" rx="6" fill="#123522" opacity="0.85"/>
      <text x="24" y="175" fill="#7ee0a0">YourMod.esp<tspan fill="#5fd97f">   &#8592; inserted</tspan></text>
      <rect x="12" y="186" width="416" height="26" rx="6" fill="#123522" opacity="0.85"/>
      <text x="24" y="205" fill="#7ee0a0">YourMod - Patch.esp<tspan fill="#5fd97f">   &#8592; inserted</tspan></text>

      <!-- touched / highlighted (red) -->
      <rect x="12" y="216" width="416" height="26" rx="6" fill="#8a0808"/>
      <text x="24" y="235" fill="#ffe8c2">SomePatch.esp<tspan fill="#f6c6b0">   &#8592; moved</tspan></text>

      <!-- more frozen base -->
      <text x="24" y="266" fill="#8f8f8f">OAAB_Data.esm</text>
      <text x="24" y="296" fill="#8f8f8f">Tamriel_Data.esm</text>
    </g>

    <!-- insertion arrow accent -->
    <path d="M-14 169 h22 M-2 162 l8 7 l-8 7" stroke="#5fd97f" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

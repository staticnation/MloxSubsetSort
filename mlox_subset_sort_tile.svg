<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#23262b"/>
      <stop offset="100%" stop-color="#121317"/>
    </linearGradient>
    <radialGradient id="ash" cx="50%" cy="120%" r="80%">
      <stop offset="0%" stop-color="#9c2410" stop-opacity="0.60"/>
      <stop offset="38%" stop-color="#4a1109" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#121317" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ember" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a2b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff6a2b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2e9"/>
      <stop offset="100%" stop-color="#f0c19a"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#ash)"/>
  <ellipse cx="640" cy="470" rx="470" ry="300" fill="url(#ember)"/>
  <rect x="0" y="0" width="1280" height="6" fill="#8a0808"/>
  <rect x="0" y="714" width="1280" height="6" fill="#8a0808" opacity="0.75"/>

  <!-- decorative daedric-esque marks -->
  <g stroke="#e8905a" stroke-width="4" fill="none" opacity="0.12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M80 610 l30 -52 l30 52 M95 584 h30"/>
    <path d="M1150 90 l0 50 l34 0 l0 -34 M1150 115 l34 0"/>
  </g>

  <!-- title block -->
  <g font-family="'DejaVu Sans','Arial',sans-serif" text-anchor="middle">
    <text x="640" y="112" font-size="27" letter-spacing="11" fill="#e8905a" font-weight="700">OPENMW &#183; LOAD-ORDER TOOL</text>
    <text x="640" y="212" font-size="104" font-weight="700" fill="url(#title)" filter="url(#glow)">MLOX Subset Sort</text>
    <text x="640" y="266" font-size="30" fill="#d6d6d6">Slot your custom mods into place &#8212; leave the curated list untouched.</text>
  </g>

  <!-- emblem: load-order panel -->
  <g transform="translate(330,318)" filter="url(#shadow)" font-family="'DejaVu Sans Mono','monospace'">
    <rect width="620" height="352" rx="16" fill="#141414" stroke="#3f3f46" stroke-width="2"/>
    <rect width="620" height="48" rx="16" fill="#23252b"/>
    <rect y="32" width="620" height="16" fill="#23252b"/>
    <circle cx="30" cy="24" r="7" fill="#8a0808"/>
    <circle cx="54" cy="24" r="7" fill="#ffb454"/>
    <circle cx="78" cy="24" r="7" fill="#7ee0a0"/>
    <text x="116" y="31" font-size="19" fill="#9a9a9a">Plugin load order</text>

    <g font-size="22">
      <text x="30" y="98"  fill="#8f8f8f">Morrowind.esm</text>
      <text x="30" y="134" fill="#8f8f8f">Bloodmoon.esm</text>

      <rect x="14" y="150" width="592" height="34" rx="7" fill="#123522"/>
      <text x="30" y="175" fill="#7ee0a0">YourMod.esp<tspan fill="#5fd97f">     &#8592; inserted</tspan></text>

      <rect x="14" y="192" width="592" height="34" rx="7" fill="#123522"/>
      <text x="30" y="217" fill="#7ee0a0">YourMod - Patch.esp<tspan fill="#5fd97f">   &#8592; inserted</tspan></text>

      <rect x="14" y="234" width="592" height="34" rx="7" fill="#8a0808"/>
      <text x="30" y="259" fill="#ffe8c2">Compatibility.esp<tspan fill="#f6c6b0">   &#8592; moved</tspan></text>

      <text x="30" y="306" fill="#8f8f8f">OAAB_Data.esm</text>
    </g>

    <!-- insertion arrow -->
    <path d="M-20 167 h30 M-4 158 l10 9 l-10 9" stroke="#5fd97f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
